<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin-Login – {{ festival_name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-lg shadow border border-slate-200 p-8">
    <h1 class="text-lg font-semibold text-center mb-1">{{ festival_name }}</h1>
    <p class="text-sm text-slate-500 text-center mb-6">Admin-Login</p>

    {% if error %}
    <div class="mb-4 p-3 rounded bg-red-50 border border-red-200 text-red-700 text-sm">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Benutzername</label>
        <input type="text" name="username" required
               class="w-full rounded border-slate-300 focus:border-indigo-600 focus:ring-indigo-600 px-3 py-2 border" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Passwort</label>
        <input type="password" name="password" required
               class="w-full rounded border-slate-300 focus:border-indigo-600 focus:ring-indigo-600 px-3 py-2 border" />
      </div>
      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded">
        Anmelden
      </button>
    </form>
    <p class="text-xs text-slate-400 text-center mt-6">
      <a href="/" class="hover:text-slate-600">← zurück zur Anmeldung</a>
    </p>
  </div>
</body>
</html>
