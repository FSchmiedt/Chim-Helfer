<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ festival_name }} – Helfer-Anmeldung{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/main.css" />
  <script>
    // Farben am Festival-Branding orientiert: cremiges Off-White als Untergrund,
    // tiefes Schwarz als Akzent (Buttons, Header).
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:  '#f5f5f5',
              600: '#0a0a0a',
              700: '#000000',
            },
            cream: {
              50:  '#faf7ee',
              100: '#f5f1e8',  // Haupt-Hintergrund
              200: '#ebe5d3',  // Header / leicht abgesetzt
            },
          },
          fontFamily: {
            display: ['Georgia', 'Times New Roman', 'serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { background-color: #f5f1e8; }
  </style>
</head>
<body class="bg-cream-100 text-slate-800 min-h-screen">
  <header class="bg-cream-200 border-b border-slate-300/50">
    <div class="max-w-3xl mx-auto px-4 py-5 flex items-center justify-between gap-4 flex-wrap">
      <h1 class="text-xl md:text-2xl font-semibold flex items-center gap-3">
        <a href="/" class="flex items-center gap-3 hover:opacity-80 transition">
          <img src="/static/favicon.svg" alt="" class="h-8 w-8" />
          <span class="font-display tracking-tight">{{ festival_name }}</span>
        </a>
        <span class="hidden sm:inline text-sm font-normal text-slate-600">— Helfer:innen</span>
      </h1>
      <nav class="text-sm flex items-center gap-4">
        {% if current_helper is defined and current_helper %}
          <a href="/me" class="text-slate-700 hover:text-black">Mein Bereich</a>
          <a href="/board" class="text-slate-700 hover:text-black">Board</a>
          <form method="post" action="/logout" class="inline">
            <button class="text-slate-500 hover:text-black">Logout</button>
          </form>
        {% else %}
          <a href="/login" class="text-slate-700 hover:text-black">Login</a>
        {% endif %}
        <a href="/admin" class="text-slate-400 hover:text-slate-700 text-xs">Admin</a>
      </nav>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-slate-500 py-6">
    {{ festival_name }} · Helfer-Tool
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
