{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-sm border border-slate-200 p-6">
  <h2 class="text-xl font-semibold mb-1">Login Helfer:innen</h2>
  <p class="text-sm text-slate-500 mb-5">Mit deiner Anmelde-Email und deinem Passwort.</p>

  {% if error %}
  <div class="mb-4 p-3 rounded bg-red-50 border border-red-200 text-red-800 text-sm">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login" class="space-y-4">
    <input type="hidden" name="next" value="{{ next }}" />
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" required value="{{ email }}" autocomplete="email"
             class="w-full rounded border-slate-300 focus:border-primary-600 focus:ring-primary-600 px-3 py-2 border" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Passwort</label>
      <input type="password" name="password" required autocomplete="current-password"
             class="w-full rounded border-slate-300 focus:border-primary-600 focus:ring-primary-600 px-3 py-2 border" />
    </div>
    <button class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 rounded">
      Einloggen
    </button>
  </form>

  <div class="mt-5 pt-4 border-t border-slate-100 text-sm text-slate-500 space-y-1">
    <div><a href="/forgot" class="text-primary-600 hover:underline">Passwort vergessen?</a></div>
    <div>Noch nicht angemeldet? <a href="/" class="text-primary-600 hover:underline">Zur Anmeldung</a></div>
  </div>
</div>
{% endblock %}
