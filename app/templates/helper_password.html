{% extends "base.html" %}

{% block content %}
<div class="mb-4 text-sm">
  <a href="/me" class="text-slate-500 hover:text-slate-800">← zurück zu Mein Bereich</a>
</div>

<div class="max-w-md bg-white rounded-lg shadow-sm border border-slate-200 p-6">
  <h2 class="text-xl font-semibold mb-4">Passwort ändern</h2>

  {% if success %}
  <div class="mb-4 p-3 rounded bg-green-50 border border-green-200 text-green-800 text-sm">
    Passwort geändert.
  </div>
  {% endif %}

  {% if error %}
  <div class="mb-4 p-3 rounded bg-red-50 border border-red-200 text-red-800 text-sm">{{ error }}</div>
  {% endif %}

  <form method="post" action="/me/password" class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">Aktuelles Passwort</label>
      <input type="password" name="current_password" required autocomplete="current-password"
             class="w-full rounded border-slate-300 focus:border-primary-600 focus:ring-primary-600 px-3 py-2 border" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Neues Passwort (min. {{ password_min_len }} Zeichen)</label>
      <input type="password" name="new_password" required minlength="{{ password_min_len }}"
             autocomplete="new-password"
             class="w-full rounded border-slate-300 focus:border-primary-600 focus:ring-primary-600 px-3 py-2 border" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Wiederholen</label>
      <input type="password" name="new_password_confirm" required minlength="{{ password_min_len }}"
             autocomplete="new-password"
             class="w-full rounded border-slate-300 focus:border-primary-600 focus:ring-primary-600 px-3 py-2 border" />
    </div>
    <button class="bg-primary-600 hover:bg-primary-700 text-white font-medium px-5 py-2 rounded">Speichern</button>
  </form>
</div>
{% endblock %}
