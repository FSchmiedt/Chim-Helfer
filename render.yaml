# Render.com Blueprint – https://render.com/docs/infrastructure-as-code
# Deploy via: https://dashboard.render.com/blueprints → "New Blueprint" → dein GitHub-Repo wählen
services:
  - type: web
    name: chimaera-helfer-tool
    runtime: docker
    # WICHTIG: 'free' blockiert ausgehenden SMTP-Traffic (Ports 25/465/587) und
    # legt den Service nach Inaktivität schlafen. Für zuverlässigen Mailversand
    # (Passwort-Reset, Tausch-Benachrichtigungen) ist mind. 'starter' nötig.
    # Steht hier 'free', setzt jeder Auto-Deploy eine manuelle Hochstufung im
    # Dashboard wieder auf Free zurück – genau das war die Ursache der
    # "manchmal klappt's, manchmal nicht"-Mails.
    plan: starter
    region: frankfurt
    autoDeploy: true
    envVars:
      # --- DB: Connection String aus Neon / anderem Provider ---
      - key: DATABASE_URL
        sync: false  # manuell im Render-Dashboard eintragen
      # --- Admin-Zugang ---
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false  # manuell setzen
      - key: SECRET_KEY
        generateValue: true  # Render generiert automatisch einen Zufallsstring
      # --- Festival ---
      - key: FESTIVAL_NAME
        value: Chimaera Festival
      - key: REGISTRATION_OPEN
        sync: false  # im Render-Dashboard setzen (true/false); wird bei Deploys NICHT überschrieben
      - key: REGISTRATION_CLOSED_MESSAGE
        sync: false  # optional, leer für Default-Text
      - key: SHIFT_SIGNUP_OPEN
        sync: false  # im Render-Dashboard setzen (true/false); wird bei Deploys NICHT überschrieben
      - key: SHIFT_SIGNUP_OPEN_AT
        sync: false  # optional: ISO-Zeitpunkt für automatische Freischaltung, z.B. 2026-07-10T14:00:00+02:00
      - key: SHIFT_SIGNUP_PREVIEW_EMAILS
        sync: false  # optional: Test-Nutzer (Komma-getrennt), sehen Schichten vor Freischaltung
      - key: SWAP_EXCLUDED_AREAS
        value: "Bar"  # Bereiche ohne Self-Service-Tausch (Komma-getrennt); Tausch läuft dort über Admin
      - key: MIN_SHIFTS
        value: "2"
      - key: MIN_DAYS
        value: "2"
      - key: BENEFITS_MIN_SHIFTS
        value: "3"
      - key: BENEFITS_MIN_DAYS
        value: "3"
      # --- SMTP (optional, manuell eintragen falls gewünscht) ---
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_ADDRESS
        sync: false
      - key: SMTP_FROM_NAME
        value: Chimaera Helfer-Team
      # --- Dev-Flag: in Produktion unbedingt false lassen ---
      - key: DEBUG_SHOW_RESET_LINK
        value: "false"
